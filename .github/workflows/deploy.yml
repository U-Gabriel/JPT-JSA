name: Deploy Admin Dashboard

on:
  push:
    branches:
      - main # Change par le nom de ta branche principale (main ou master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Installer le code
      uses: actions/checkout@v4

    - name: Configurer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Installer les dépendances et Build
      working-directory: ./admin-dashboard
      run: |
        npm install
        npm run build

    - name: Déployer sur le VPS via SSH/SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}       # L'IP de ton VPS
        username: ${{ secrets.VPS_USER }}   # Ton nom d'utilisateur (ex: root, ubuntu...)
        key: ${{ secrets.VPS_SSH_KEY }}     # Ta clé privée SSH
        source: "admin-dashboard/dist/"
        target: "/var/www/html/gabuzarf"
        strip_components: 2
        overwrite: true
